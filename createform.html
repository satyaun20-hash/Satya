<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <table border="1">
            <tr>
                <td colspan="2">Pizaa Shop 2.0</td>
            </tr>
            <tr>
               <td>Name</td>
               <td>
                <input type="text">
               </td>
            </tr>
            <tr>
                <td>Pizza tooping</td>
                <td>
                    <input type="radio">
                    <label for="">Suppreme</label><br>
                    <input type="radio">
                    <label for="">Vegetarian</label><br>
                    <input type="radio">
                    <label for="">Hawaiian</label>
                </td>
            </tr>
            <tr>
                <td>Pizza Size</td>
                <td>
                    <select name="" id="">
                        <option value="Small">Small</option>
                        <option value="Medium">Medium</option>
                        <option value="Large">Large</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Optional Exstra</td>
                <td>
                    <input type="checkbox">
                    <label for="">Extra Cheese</label>
                    <input type="checkbox">
                    <label for="">Extra Sauce</label>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    Delivery Address: <br>
                    <textarea name="deliveryAddress" id=""></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <button>Send Order</button>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
