<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        /* ljskdfhjkwehfqiwuehf */
       body{
        background-color: antiquewhite;
       }
    </style>

    <center>
        Student Registeration Form
        <table>
            <tr>
                <td>Roll no. :</td>
                <td>
                    <input type="text">
                </td>
            </tr>
            <tr>
                <td>Student name :</td>
                <td>
                    <input type="text" placeholder="Full name">
                    -
                    <input type="text" placeholder="Last name">
                </td>

            </tr>
            <tr>
                <td>Father's Name</td>
                <td>
                    <input type="text">
                </td>
            </tr>
            <tr>
                <td>Date Of Birth :</td>
                <td>
                    <input type="date" style="width: 10%;">
                    -
                    <input type="date" style="width: 10%;">
                    -
                    <input type="date" style="width: 10%;">
                    <label for="">(DD-MM-YYYY)</label>
                </td>

            </tr>
            <tr>
                <td>Moblie no.</td>
                <td>
                    <input type="number" style="width: 5%;">
                    <input type="text">
                </td>

            </tr>
            <tr>
                <td>Email ID</td>
                <td>
                    <input type="text">
                </td>
            </tr>
            <tr>
                <td>Password</td>
                <td>
                    <input type="text">
                </td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="checkbox">
                    <label for="">Male</label>
                    <input type="checkbox">
                    <label for="">Female</label>
                </td>

            </tr>
            <tr>
                <td>Department</td>
                <td>
                    <input type="checkbox">
                    <label for="">CSE</label>
                    <input type="checkbox">
                    <label for="">IT</label>
                    <input type="checkbox">
                    <label for="">ECE</label>
                    <input type="checkbox">
                    <label for="">Civil</label>
                    <input type="checkbox">
                    <label for="Mech"></label>
                </td>


            </tr>
            <tr>
                <td>Course :</td>
                <td>
                    <select name="" id="" style="width: 97.7%;">
                        <option value="">+++++++++++++++++++++++++++++++++SELECT YOUR LEVEL+++++++++++++++++++++++++++++++++++++</option>
                        <option value="">Intermedie</option>
                        <option value="">Advance</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Student Photo</td>
                <td>
                    <input type="file">
                    <label for="No file chosen"></label>
                </td>
            </tr>
            <tr>
                <td>City</td>
                <td>
                    <input type="text">
                </td>
            </tr>
            <tr>
                <td>Address</td>
                <td>
                    <textarea name="" id=""></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <button style="margin-left: 50%;">Register</button>
                </td>
            </tr>
        </table>
    </center>
</body>

</html>
