<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS3 Browser Support</title>
<style>
    body {
        font-family: "Times New Roman", serif;
        display: flex;
        justify-content: center;
        margin-top: 40px;
    }

    table {
        border-collapse: collapse;
        border: 3px solid black;
        width: 700px;
        text-align: center;
    }

    caption {
        font-weight: bold;
        font-size: 18px;
        margin-bottom: 8px;
    }

    th, td {
        border: 1px solid black;
        padding: 10px;
    }

    th {
        background-color: #f2f2f2;
        font-weight: bold;
    }

    .left {
        text-align: left;
        font-weight: bold;
    }
</style>
</head>
<body>

<table>
    <h1>CSS3 Browser Support (latest browser versions)</h1>
    <tr>
        <th>CSS Property</th>
        <th>Internet Explorer</th>
        <th>FireFox</th>
        <th>Chrome</th>
        <th>Safari</th>
        <th>Opera</th>
    </tr>
    <tr>
        <td class="left">Border Radius</td>
        <td>YES</td>
        <td>YES</td>
        <td>YES</td>
        <td>YES</td>
        <td>YES</td>
    </tr>
    <tr>
        <td class="left">Box Shadow</td>
        <td>YES</td>
        <td>YES</td>
        <td>YES</td>
        <td>YES</td>
        <td>YES</td>
    </tr>
    <tr>
        <td class="left">CSS Animations</td>
        <td>NO</td>
        <td>NO</td>
        <td>YES</td>
        <td>YES</td>
        <td>NO</td>
    </tr>
</table>

</body>
</html>
